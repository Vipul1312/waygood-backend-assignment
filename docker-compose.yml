version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/waygood-evaluation
      JWT_SECRET: replace-with-a-long-secret
      JWT_EXPIRES_IN: 1d
      CACHE_TTL_SECONDS: 300
      REDIS_URL: redis://redis:6379

volumes:
  mongo-data:
